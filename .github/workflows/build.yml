name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 17 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21, 25]
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=${RAW_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          RAW_NAME: ghcr.io/${{ github.repository }}-${{ matrix.java }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{sha}}-{{date 'DDMMYYYY'}},enable={{is_default_branch}}

      - name: Build image for scan (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: JAVA_VERSION=${{ matrix.java }}
          load: true
          tags: local/scan-${{ matrix.java }}
          cache-from: type=gha,scope=java-${{ matrix.java }}
          cache-to: type=gha,mode=max,scope=java-${{ matrix.java }}

      - name: Vulnerability gate (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local/scan-${{ matrix.java }}
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: JAVA_VERSION=${{ matrix.java }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          cache-from: type=gha,scope=java-${{ matrix.java }}
          cache-to: type=gha,mode=max,scope=java-${{ matrix.java }}
